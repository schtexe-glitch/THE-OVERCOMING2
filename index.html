<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Overcoming - Training Scroll</title>

    <!-- Manifest & Theme Color -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff7a00">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'VT323', monospace;
            background-color: #0c090d; 
            color: #fef3c7;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('https://i.pinimg.com/originals/70/0f/c1/700fc139196efa9b8d755e95b2dcbfc8.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
            pointer-events: none;
        }

        .app-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .pixel-btn {
            background: rgba(45, 27, 20, 0.9);
            border: 4px solid #000;
            box-shadow: 
                inset -4px -4px 0px 0px #1a0f0a,
                4px 4px 0px 0px rgba(0,0,0,0.6);
            padding: 12px 24px;
            font-size: 1.6rem;
            color: #fbbf24;
            transition: all 0.1s;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            text-transform: uppercase;
        }

        .pixel-btn:hover:not(:disabled) {
            background: #452a1e;
            color: #fcd34d;
            transform: scale(1.05);
        }

        .pixel-btn-small {
            background: rgba(45, 27, 20, 0.9);
            border: 2px solid #000;
            padding: 4px 8px;
            font-size: 0.9rem;
            color: #fbbf24;
            cursor: pointer;
        }

        /* Stat Bars */
        .stats-container {
            width: 320px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #fbbf24;
            padding: 15px;
            margin-top: 20px;
        }

        .stat-row {
            margin-bottom: 8px;
            text-align: left;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 2px;
            color: #fbbf24;
        }

        .bar-bg {
            width: 100%;
            height: 12px;
            background: #2d1b14;
            border: 2px solid #000;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }

        /* Scroll Styling */
        .scroll-container {
            position: relative;
            margin-top: 20px;
            width: 300px;
            transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-container.open { width: 500px; }

        .scroll-rod {
            width: 40px;
            height: 280px;
            background: #d97706;
            border: 4px solid #000;
            box-shadow: inset -6px 0 0 #92400e;
            z-index: 20;
            position: relative;
        }

        .scroll-rod::before, .scroll-rod::after {
            content: '';
            position: absolute;
            left: -8px;
            width: 48px; height: 12px;
            background: #92400e;
            border: 4px solid #000;
        }
        .scroll-rod::before { top: -16px; }
        .scroll-rod::after { bottom: -16px; }

        .scroll-paper {
            height: 220px; width: 0;
            background: #fef3c7;
            border-top: 4px solid #000;
            border-bottom: 4px solid #000;
            overflow: hidden;
            transition: width 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .scroll-container.open .scroll-paper { width: 420px; }

        .quest-text {
            color: #451a03;
            font-size: 2rem;
            opacity: 0;
            transition: opacity 0.5s 0.8s;
            padding: 0 40px;
            line-height: 1.1;
        }

        .scroll-container.open .quest-text { opacity: 1; }

        .unravel-btn { position: absolute; z-index: 30; }

        .floating-companion {
            position: absolute;
            bottom: 40px; 
            left: 10%;
            z-index: 200; 
            transition: left 2.5s ease-in-out, top 2.5s ease-in-out;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .companion-bubble {
            background: #fff; color: #000;
            border: 3px solid #000;
            padding: 6px 12px;
            font-size: 1.2rem;
            position: relative;
            margin-bottom: 10px;
            max-width: 160px;
            text-transform: uppercase;
        }

        .companion-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px; left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: #000 transparent;
        }

        .companion-wrapper {
            display: block;
            animation: floatBob 3.5s ease-in-out infinite;
        }

        .floating-companion img {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.4));
        }

        /* Modal Overlay */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes floatBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .hidden { display: none; }
        
        .debug-skip {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            opacity: 0.5;
        }
        .debug-skip:hover { opacity: 1; }
    </style>
</head>
<body>

    <button class="pixel-btn-small debug-skip hidden" id="skip-timer-btn" onclick="skipTimer()">DEBUG: SKIP</button>

    <div class="animated-bg"></div>
    <div class="bg-overlay"></div>

    <!-- Home Screen -->
    <div id="home-screen" class="app-layer">
        <h1 class="text-7xl mb-4 tracking-[0.2em] text-amber-400 font-bold" style="text-shadow: 6px 6px 0px #000;">THE OVERCOMING</h1>
        
        <button class="pixel-btn text-3xl px-12 mb-6" onclick="startApp()">BEGIN ASCENT</button>
        
        <div class="stats-container">
            <h3 class="text-xl text-center mb-4 text-white">CHARACTER STATS</h3>
            <div class="stat-row">
                <div class="stat-label"><span>STR</span> <span id="str-val">LV. 0</span></div>
                <div class="bar-bg"><div id="str-bar" class="bar-fill bg-red-600"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><span>SKILL</span> <span id="skill-val">LV. 0</span></div>
                <div class="bar-bg"><div id="skill-bar" class="bar-fill bg-blue-500"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><span>FOCUS</span> <span id="focus-val">LV. 0</span></div>
                <div class="bar-bg"><div id="focus-bar" class="bar-fill bg-emerald-500"></div></div>
            </div>
        </div>
    </div>

    <!-- Quest Screen -->
    <div id="quest-screen" class="app-layer hidden">
        <h2 id="session-timer" class="text-6xl text-amber-300 mb-4" style="text-shadow: 4px 4px 0 #000">05:00</h2>
        
        <div class="scroll-container" id="quest-scroll">
            <div class="scroll-rod"></div>
            <div class="scroll-paper">
                <div id="quest-display" class="quest-text">Your quest awaits...</div>
            </div>
            <div class="scroll-rod"></div>
            <button class="pixel-btn unravel-btn" id="unravel-trigger" onclick="unravelQuest()">UNRAVEL</button>
        </div>

        <!-- Quest Navigation Below Scroll -->
        <div id="active-quest-controls" class="mt-8 hidden">
            <button class="pixel-btn text-xl" onclick="triggerCompletionModal('QUEST COMPLETED')">Quest completed</button>
        </div>

        <!-- Penalty Scroll (Visible only on failure) -->
        <div id="penalty-scroll" class="scroll-container open hidden mt-8">
            <div class="scroll-rod"></div>
            <div class="scroll-paper" style="background: #fee2e2;">
                <div class="quest-text opacity-100 text-red-900 text-lg">
                    <div class="font-bold border-b border-red-900 mb-2">PENALTY FOR FAILURE</div>
                    20 PUSHUPS<br>
                    20 SQUATS<br>
                    1 MIN PLANK
                </div>
            </div>
            <div class="scroll-rod"></div>
        </div>

        <div class="mt-8">
            <button class="pixel-btn text-xl hidden" id="return-home-btn" onclick="location.reload()">RETURN TO CAMP</button>
        </div>

        <div class="floating-companion" id="floating-companion">
            <div class="companion-bubble" id="companion-quote">Focus...</div>
            <div class="companion-wrapper">
                <img id="companion-img" src="https://i.ibb.co/99gdnzTk/SONGOKU.png" alt="Companion">
            </div>
        </div>
    </div>

    <!-- Completion Modal -->
    <div id="modal-overlay">
        <div class="bg-black border-4 border-amber-400 p-8 max-w-sm text-center">
            <h2 class="text-4xl text-amber-400 mb-8" id="modal-header">TIME ELAPSED</h2>
            <button class="pixel-btn w-full text-2xl mb-4" onclick="claimVictory()">QUEST COMPLETE?</button>
            <button class="text-red-400 uppercase text-xl font-bold hover:underline" onclick="claimFailure()">I have Failed</button>
        </div>
    </div>

    <!-- JavaScript remains unchanged -->
    <script>
        // All your previous JS code here (quests, stats, timers, functions)
    </script>
</body>
</html>
