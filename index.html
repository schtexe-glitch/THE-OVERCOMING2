<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Overcoming - Training Scroll</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'VT323', monospace;
            background-color: #050b14; 
            color: #fef3c7;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('https://i.imgur.com/qVtx2.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.7) contrast(1.1);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 11, 20, 0.7) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .app-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px #fbbf24, 4px 4px 0px 0px rgba(0,0,0,0.6); }
            50% { box-shadow: 0 0 25px #fbbf24, 4px 4px 0px 0px rgba(0,0,0,0.6); }
            100% { box-shadow: 0 0 5px #fbbf24, 4px 4px 0px 0px rgba(0,0,0,0.6); }
        }

        .ascent-glow {
            animation: pulse-glow 2s infinite ease-in-out;
            border: 4px solid #fbbf24 !important;
        }

        .pixel-circle-btn {
            width: 50px;
            height: 50px;
            background: #1a2533;
            border: 4px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .pixel-circle-btn span {
            font-size: 2rem;
            color: #fbbf24;
            text-shadow: 2px 2px 0 #000;
        }

        .pixel-btn {
            background: rgba(15, 25, 35, 0.9);
            border: 4px solid #000;
            box-shadow: 
                inset -4px -4px 0px 0px #2a3a4a,
                4px 4px 0px 0px rgba(0,0,0,0.6);
            padding: 12px 24px;
            font-size: 1.6rem;
            color: #fbbf24;
            transition: all 0.1s;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            text-transform: uppercase;
        }

        .pixel-btn:hover:not(:disabled) {
            background: #1a2a3a;
            color: #fcd34d;
            transform: scale(1.05);
        }

        .stats-container {
            width: 320px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #fbbf24;
            padding: 15px;
            margin-top: 20px;
            backdrop-filter: blur(8px);
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 2px;
            color: #fbbf24;
        }

        .bar-bg {
            width: 100%;
            height: 12px;
            background: #1a1a1a;
            border: 2px solid #000;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
            box-shadow: 0 0 10px currentColor;
        }

        .universal-container {
            border: 4px solid #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            margin-bottom: 12px;
            padding: 8px;
        }

        .scroll-container {
            position: relative;
            margin-top: 20px;
            width: 100px;
            transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-container.open { width: 500px; }

        .scroll-rod {
            width: 40px;
            height: 280px;
            background: #d97706;
            border: 4px solid #000;
            box-shadow: inset -6px 0 0 #92400e;
            z-index: 20;
            position: relative;
        }

        .scroll-rod::before, .scroll-rod::after {
            content: '';
            position: absolute;
            left: -8px;
            width: 48px; height: 12px;
            background: #92400e;
            border: 4px solid #000;
        }
        .scroll-rod::before { top: -16px; }
        .scroll-rod::after { bottom: -16px; }

        .scroll-paper {
            height: 220px; width: 0;
            background: #fef3c7;
            border-top: 4px solid #000;
            border-bottom: 4px solid #000;
            overflow: hidden;
            transition: width 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .scroll-container.open .scroll-paper { width: 420px; }

        .quest-text {
            color: #451a03;
            font-size: 1.8rem;
            opacity: 0;
            transition: opacity 0.5s 0.8s;
            padding: 0 40px;
            line-height: 1.1;
            max-height: 180px;
            overflow-y: auto;
            text-align: center;
        }

        .scroll-container.open .quest-text { opacity: 1; }

        .seal-trigger {
            position: absolute;
            z-index: 40;
            width: 110px;
            height: 110px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .seal-trigger:active { transform: scale(0.95); }

        @keyframes seal-shake {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 2px) rotate(-1deg); }
            75% { transform: translate(2px, 2px) rotate(1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .seal-trigger.cracking { animation: seal-shake 0.15s infinite; }

        .seal-fragment {
            position: absolute;
            background: #991b1b;
            border: 4px solid #000;
            background-image: 
                radial-gradient(circle at 30% 30%, #b91c1c 10%, transparent 10.5%),
                radial-gradient(circle at 70% 60%, #7f1d1d 8%, transparent 8.5%);
            background-size: 8px 8px;
            transition: all 0.7s cubic-bezier(0.5, 0, 0.1, 1);
            overflow: hidden;
        }

        .seal-fragment::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(45deg, transparent 48%, #000 49%, #000 51%, transparent 52%),
                              linear-gradient(-45deg, transparent 48%, #000 49%, #000 51%, transparent 52%);
            background-size: 30px 30px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .seal-trigger.cracking .seal-fragment::before { opacity: 0.6; }

        .f1 { width: 50%; height: 50%; top: 0; left: 0; border-radius: 100% 0 0 0; border-right: none; border-bottom: none;}
        .f2 { width: 50%; height: 50%; top: 0; right: 0; border-radius: 0 100% 0 0; border-left: none; border-bottom: none;}
        .f3 { width: 50%; height: 50%; bottom: 0; left: 0; border-radius: 0 0 0 100%; border-right: none; border-top: none;}
        .f4 { width: 50%; height: 50%; bottom: 0; right: 0; border-radius: 0 0 100% 0; border-left: none; border-top: none;}

        .seal-trigger.breaking .f1 { transform: translate(-150px, -150px) rotate(-120deg); opacity: 0; }
        .seal-trigger.breaking .f2 { transform: translate(150px, -150px) rotate(120deg); opacity: 0; }
        .seal-trigger.breaking .f3 { transform: translate(-150px, 150px) rotate(-240deg); opacity: 0; }
        .seal-trigger.breaking .f4 { transform: translate(150px, 150px) rotate(240deg); opacity: 0; }

        .seal-inner {
            position: absolute;
            z-index: 45;
            color: #fbbf24;
            font-size: 1.4rem;
            pointer-events: none;
            text-align: center;
            line-height: 1;
            text-shadow: 2px 2px 0 #000;
            padding: 10px;
            border-radius: 50%;
            transition: opacity 0.2s;
        }

        .seal-trigger.breaking .seal-inner { opacity: 0; }

        #modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .popup-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 4px solid #fbbf24;
            padding: 20px;
            z-index: 2000;
            text-align: center;
            box-shadow: 0 0 30px #fbbf24;
        }

        .hidden { display: none; }
        
        .floating-companion {
            position: absolute;
            bottom: 40px; 
            left: 10%;
            z-index: 200; 
            transition: left 2.5s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .companion-bubble {
            background: #fff; color: #000;
            border: 3px solid #000;
            padding: 10px 16px;
            font-size: 1.1rem;
            position: relative;
            margin-bottom: 10px;
            max-width: 220px;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 #000;
            line-height: 1.2;
            text-align: center;
        }

        .companion-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px; left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: #000 transparent;
        }

        .companion-wrapper {
            display: block;
            animation: floatBob 3.5s ease-in-out infinite;
        }

        .floating-companion img {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.8));
        }

        @keyframes floatBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .controls-top-right {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border: 2px solid #000;
            backdrop-filter: blur(4px);
        }

        /* Pixel Range Styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #1a2533;
            border: 2px solid #000;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 12px;
            background: #fbbf24;
            border: 2px solid #000;
            margin-top: -7px;
            box-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>
    <div class="bg-overlay"></div>

    <div class="controls-top-right">
        <div class="flex flex-col items-center">
            <span class="text-xs text-amber-200 uppercase mb-1">Vol</span>
            <input type="range" min="0" max="1" step="0.05" value="0.5" id="volume-slider" oninput="adjustVolume(this.value)">
        </div>
        <button class="pixel-circle-btn" id="music-toggle-btn" onclick="toggleAmbience()">
            <span id="music-icon">♪</span>
        </button>
    </div>

    <div id="home-screen" class="app-layer">
        <h1 class="text-7xl mb-4 tracking-[0.2em] text-amber-400 font-bold" style="text-shadow: 6px 6px 0px #000;">THE OVERCOMING</h1>
        <p class="text-xl mb-8 tracking-widest text-amber-200/50 uppercase">Discipline in the storm</p>
        
        <div class="flex flex-col gap-4">
            <button class="pixel-btn text-3xl px-12 ascent-glow" onclick="startApp()">BEGIN ASCENT</button>
        </div>
        
        <div class="stats-container">
            <div class="universal-container">
                <div class="stat-label"><span class="font-bold">TOTAL LVL</span> <span id="universal-val">LV. 0</span></div>
                <div class="bar-bg"><div id="universal-bar" class="bar-fill bg-amber-400"></div></div>
            </div>

            <h3 class="text-lg text-center mb-2 text-white/70">ATTRIBUTE STATS</h3>
            <div class="stat-row">
                <div class="stat-label"><span>STR</span> <span id="str-val">LV. 0</span></div>
                <div class="bar-bg"><div id="str-bar" class="bar-fill bg-red-600"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><span>STAM</span> <span id="stam-val">LV. 0</span></div>
                <div class="bar-bg"><div id="stam-bar" class="bar-fill bg-blue-500"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><span>FOCUS</span> <span id="focus-val">LV. 0</span></div>
                <div class="bar-bg"><div id="focus-bar" class="bar-fill bg-emerald-500"></div></div>
            </div>
        </div>
    </div>

    <div id="quest-screen" class="app-layer hidden">
        <div class="flex flex-col items-center">
            <h2 id="session-timer" class="text-6xl text-amber-300" style="text-shadow: 4px 4px 0 #000">05:00</h2>
        </div>
        
        <div class="scroll-container" id="quest-scroll">
            <div class="scroll-rod"></div>
            <div class="scroll-paper">
                <div id="quest-display" class="quest-text">Consulting the Stars...</div>
            </div>
            <div class="scroll-rod"></div>
            
            <div class="seal-trigger" id="unravel-trigger" onclick="unravelQuest()">
                <div class="seal-fragment f1"></div>
                <div class="seal-fragment f2"></div>
                <div class="seal-fragment f3"></div>
                <div class="seal-fragment f4"></div>
                <div class="seal-inner font-bold uppercase" id="seal-text">Unravel<br>Fate</div>
            </div>
        </div>

        <div id="active-quest-controls" class="mt-8 hidden">
            <button class="pixel-btn text-xl" onclick="triggerCompletionModal('QUEST COMPLETED')">Quest completed</button>
        </div>

        <div class="mt-8">
            <button class="pixel-btn text-xl hidden" id="return-home-btn" onclick="location.reload()">RETURN TO CAMP</button>
        </div>

        <div class="floating-companion" id="floating-companion">
            <div class="companion-bubble" id="companion-quote">The storm is your teacher.</div>
            <div class="companion-wrapper">
                <img id="companion-img" src="https://i.ibb.co/99gdnzTk/SONGOKU.png" alt="Companion">
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="bg-black border-4 border-amber-400 p-8 max-w-sm text-center">
            <h2 class="text-4xl text-amber-400 mb-8" id="modal-header">TIME ELAPSED</h2>
            <button class="pixel-btn w-full text-2xl mb-4" onclick="claimVictory()">CLAIM VICTORY</button>
            <button class="text-red-400 uppercase text-xl font-bold hover:underline" onclick="claimFailure()">I HAVE FAILED</button>
        </div>
    </div>

    <div id="victory-popup" class="popup-box hidden">
        <h2 class="text-3xl text-amber-400 mb-2">VICTORY</h2>
        <p class="text-2xl text-white mb-4">+3 EXP EARNED!</p>
        <button class="pixel-btn text-lg" onclick="closeVictoryPopup()">CONTINUE</button>
    </div>

    <!-- Background Rain Audio Element -->
    <audio id="bg-rain-audio" loop>
        <source src="file:///E:/mixkit-light-rain-loop-2393.wav" type="audio/wav">
    </audio>

    <script>
        const apiKey = "";
        const GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";

        const questDatabase = {
            str: [
                ["Push-Ups – 14 reps", "Squats – 19 reps", "Lunges – 12 each leg"],
                ["Push-Ups – 19 reps", "Squats – 24 reps", "Lunges – 14 each leg"]
            ],
            stam: [
                ["Jumping Jacks – 54", "High Knees – 44", "Jog in Place – 3 minutes"],
                ["Jumping Jacks – 64", "High Knees – 54", "Jog in Place – 3 min 15 sec"]
            ],
            focus: [
                ["Read – 5 pages", "Stillness – 4 minutes", "Deep Breathing – 24 breaths"],
                ["Read – 6 pages", "Stillness – 4 min 15 sec", "Deep Breathing – 29 breaths"]
            ]
        };

        const LVL_THRESHOLD = 12; 
        let stats = JSON.parse(localStorage.getItem('overcoming_stats')) || { str: 0, stam: 0, focus: 0, universal: 0 };
        let currentQuest = null;
        let timerInterval;
        let totalSeconds = 300;
        let isGenerating = false;
        let audioCtx = null;
        let synthGain = null;

        const rainAudio = document.getElementById('bg-rain-audio');

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            synthGain = audioCtx.createGain();
            synthGain.gain.value = 0;
            synthGain.connect(audioCtx.destination);
        }

        function toggleAmbience() {
            initAudio();
            const musicIcon = document.getElementById('music-icon');
            
            if (rainAudio.paused) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                rainAudio.play().catch(e => console.log("Audio block:", e));
                
                // Also play low synth hum for depth
                if (!synthGain.hasStarted) {
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 55;
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass'; filter.frequency.value = 200;
                    osc.connect(filter); filter.connect(synthGain);
                    osc.start(); synthGain.hasStarted = true;
                }
                synthGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1);
                musicIcon.innerText = '🔊';
            } else {
                rainAudio.pause();
                synthGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                musicIcon.innerText = '♪';
            }
        }

        function adjustVolume(val) {
            rainAudio.volume = val;
            if (synthGain) synthGain.gain.value = val * 0.3; // Scale synth hum with rain
        }

        async function fetchGeminiResponse(prompt, systemInstruction) {
            let retries = 0;
            while (retries < 5) {
                try {
                    const response = await fetch(`${GEMINI_API_URL}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    retries++;
                    await new Promise(res => setTimeout(res, Math.pow(2, retries) * 1000));
                }
            }
            return "Warrior's Path";
        }

        async function unravelQuest() {
            if (isGenerating) {
                playCrackSound();
                return;
            }
            
            isGenerating = true;
            const trigger = document.getElementById('unravel-trigger');
            const sealText = document.getElementById('seal-text');

            trigger.classList.add('cracking');
            sealText.innerHTML = "BREAKING<br>...";
            playCrackSound();

            const categories = ['str', 'stam', 'focus'];
            const category = categories[Math.floor(Math.random() * categories.length)];
            const level = Math.min(Math.floor(stats[category] / LVL_THRESHOLD), questDatabase[category].length - 1);
            const rawQuestText = questDatabase[category][level][Math.floor(Math.random() * questDatabase[category][level].length)];

            const systemPrompt = `You are a naming master for a training camp. Take an exercise and give it an epic 2-4 word martial arts title. Return ONLY the title.`;
            const epicTitle = await fetchGeminiResponse(`Exercise: ${rawQuestText}`, systemPrompt);
            const finalQuestText = epicTitle.replace(/"/g, '') + "\n\n" + rawQuestText;

            trigger.classList.remove('cracking');
            trigger.classList.add('breaking');
            playSealShatterSound();

            setTimeout(() => {
                trigger.classList.add('hidden');
                document.getElementById('quest-display').innerText = finalQuestText;
                document.getElementById('quest-scroll').classList.add('open');
                document.getElementById('active-quest-controls').classList.remove('hidden');
                currentQuest = { type: category };
                startTimer();
            }, 600);
        }

        function playCrackSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gn = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            gn.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gn.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gn); gn.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playSealShatterSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gn = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.5);
            gn.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gn.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gn); gn.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function updateStatUI() {
            ['str', 'stam', 'focus', 'universal'].forEach(type => {
                const xp = stats[type] || 0;
                const level = Math.floor(xp / LVL_THRESHOLD);
                const progress = ((xp % LVL_THRESHOLD) / LVL_THRESHOLD) * 100;
                document.getElementById(`${type}-val`).innerText = `LV. ${level}`;
                document.getElementById(`${type}-bar`).style.width = `${progress}%`;
            });
            localStorage.setItem('overcoming_stats', JSON.stringify(stats));
        }

        function startApp() {
            initAudio();
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quest-screen').classList.remove('hidden');
            updateStatUI(); 
            moveCompanion();
            
            // Auto-play the rain loop on first start interaction
            if (rainAudio.paused) toggleAmbience();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds--;
                const m = Math.floor(totalSeconds / 60);
                const s = totalSeconds % 60;
                document.getElementById('session-timer').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                if (totalSeconds <= 0) triggerCompletionModal("TIME ELAPSED");
            }, 1000);
        }

        function triggerCompletionModal(header) {
            clearInterval(timerInterval);
            document.getElementById('modal-header').innerText = header;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function claimVictory() {
            stats[currentQuest.type] += 3;
            stats.universal += 3;
            updateStatUI();
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('victory-popup').classList.remove('hidden');
        }

        function claimFailure() { location.reload(); }
        function closeVictoryPopup() { location.reload(); }

        function moveCompanion() {
            const container = document.getElementById('floating-companion');
            let isOnRight = false;
            setInterval(() => {
                isOnRight = !isOnRight;
                container.style.left = isOnRight ? "80%" : "10%";
            }, 8000);
        }

        updateStatUI();
    </script>
</body>
</html>
